<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{TITLE}} | Edoardo Vicentini</title>
  <meta name="description" content="{{SUMMARY}}" />
  <meta property="og:title" content="{{TITLE}} | Edoardo Vicentini" />
  <meta property="og:description" content="{{SUMMARY}}" />
  <meta property="og:type" content="website" />
  <link rel="canonical" href="{{CANONICAL}}" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/print.css" />
</head>
<body class="page-project">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header" aria-label="Site header" data-partial="header"></header>

  <main id="main" class="container">
    <section class="section project-hero">
      <a class="btn ghost" href="../cv.html#projects-section"><- Back to projects</a>
      <h1>{{TITLE}}</h1>
      <div class="meta">{{YEAR}}</div>
      <p class="tagline">{{SUMMARY}}</p>
    </section>

    <section class="section project-section">
      <div class="grid grid-2">
        <div class="card">
          <h2>Why it matters</h2>
          <p>{{WHY_IT_MATTERS}}</p>
        </div>
        <div class="card">
          <h2>My role</h2>
          <p>{{ROLE}}</p>
        </div>
      </div>
    </section>

    <section class="section project-section">
      <div class="grid grid-2">
        <div class="card">
          <h2>Methods</h2>
          {{METHODS_LIST}}
          <div class="tag-list">{{METHODS_PILLS}}</div>
        </div>
        <figure class="figure-placeholder">
          <div class="figure-box">Key figure placeholder</div>
          <figcaption>Replace with a project-specific figure and caption.</figcaption>
        </figure>
      </div>
    </section>

    <section class="section project-section">
      <div class="grid grid-2">
        <div class="card">
          <h2>Outputs</h2>
          <ul>
            <li>Papers (to be added)</li>
            <li>Code (to be added)</li>
            <li>Data (to be added)</li>
          </ul>
        </div>
        <div class="card">
          <h2>Timeline</h2>
          <p>{{TIMELINE}}</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer" data-partial="footer"></footer>

  <script src="../assets/js/core/layout.js"></script>
  <script src="../assets/js/main.js"></script>
</body>
</html>
